services:
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-dev-plane-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: rag_app
      POSTGRES_PASSWORD: rag_app_password
    volumes:
      - rag_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_app -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres-pgvector:
        condition: service_healthy
    restart: unless-stopped
    # Ollama runs externally; point EMBEDDING_BASE_URL to the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rag_pgvector_data:
