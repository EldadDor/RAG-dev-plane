services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped
    # Ollama runs externally; point EMBEDDING_BASE_URL to the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
